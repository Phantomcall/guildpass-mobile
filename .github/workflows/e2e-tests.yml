name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  e2e-ios:
    name: E2E Tests (iOS)
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Checkout SDK
        run: |
          git clone --depth 1 https://github.com/Adamantine-Guild/guildpass-sdk.git "${{ github.workspace }}/../guildpass-sdk"

      - name: Apply SDK patches
        run: |
          cd "${{ github.workspace }}/../guildpass-sdk"
          git apply "${{ github.workspace }}/patches/guildpass-sdk.patch"

      - name: Install dependencies
        run: npm ci

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS app
        run: |
          npx expo prebuild --platform ios --clean
          xcodebuild -workspace ios/guildpassmobile.xcworkspace \
            -scheme guildpassmobile \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ios/build \
            -destination 'platform=iOS Simulator,name=iPhone 15'

      - name: Boot iOS Simulator
        run: |
          xcrun simctl boot "iPhone 15" || true
          xcrun simctl list devices

      - name: Install app on simulator
        run: |
          xcrun simctl install booted ios/build/Build/Products/Debug-iphonesimulator/guildpassmobile.app

      - name: Run Maestro E2E tests
        run: |
          maestro test .maestro/ --format junit --output test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-ios
          path: test-results/

      - name: Upload Maestro recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-recordings-ios
          path: ~/.maestro/tests/**/*.mp4

  e2e-android:
    name: E2E Tests (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Checkout SDK
        run: |
          git clone --depth 1 https://github.com/Adamantine-Guild/guildpass-sdk.git "${{ github.workspace }}/../guildpass-sdk"

      - name: Apply SDK patches
        run: |
          cd "${{ github.workspace }}/../guildpass-sdk"
          git apply "${{ github.workspace }}/patches/guildpass-sdk.patch"

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Setup Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: echo "Emulator started"

      - name: Build Android app
        run: |
          npx expo prebuild --platform android --clean
          cd android
          ./gradlew assembleDebug

      - name: Run Maestro E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            adb install android/app/build/outputs/apk/debug/app-debug.apk
            maestro test .maestro/ --format junit --output test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-android
          path: test-results/

      - name: Upload Maestro recordings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-recordings-android
          path: ~/.maestro/tests/**/*.mp4
